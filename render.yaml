databases:
  - name: mediorder-db
    databaseName: mediorder
    user: mediorder
    plan: free

services:
  - type: web
    name: mediorder-web
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: "Mediorder"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false # Set this in the Render Dashboard with a valid base64 key
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false # Set this to your Render URL (e.g. https://mediorder-web.onrender.com)
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: mediorder-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
